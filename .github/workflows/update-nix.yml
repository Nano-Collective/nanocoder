name: Update Nix Package

# Disabled until nixpkgs ships pnpm 11 support.
#
# nanocoder's lockfile is generated by pnpm 11 (new patchedDependencies /
# overrides format, SQLite-backed v11 store), but nixpkgs-unstable still
# defaults to pnpm 10.33.2. Hand-overriding the pnpm derivation in
# flake.nix surfaces a moving cascade of pnpm-11-specific incompatibilities
# in fetchPnpmDeps (cjs shim permissions, rejected global config keys,
# fixupPhase cleanup paths hardcoded to v3/v10, non-deterministic SQLite
# index.db inside the v11 store).
#
# Tracking: nixpkgs PR #505103 (pnpm_11: init at 11.0.4) — open since
# 2026-03-30. Re-enable this workflow once it merges into nixpkgs-unstable
# and the standard pkgs.pnpm/pkgs.fetchPnpmDeps work without overrides.
# See https://github.com/Nano-Collective/nanocoder/issues/511 for the
# full investigation and re-enablement checklist.
#
# release.yml still invokes this via `workflow_call`, so we keep both
# triggers registered and just no-op. Manual workflow_dispatch fails
# loudly so it's obvious why nothing happened; workflow_call from
# release.yml succeeds-with-warning so it doesn't noisily fail every
# release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (workflow disabled — see header)'
        required: true
        type: string
        default: 'disabled'

  workflow_call:
    inputs:
      version:
        description: 'Version (workflow disabled — see header)'
        required: true
        type: string
    secrets:
      PAT_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  noop:
    name: Workflow disabled (pnpm 11 / nixpkgs)
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          MSG="update-nix.yml is disabled pending nixpkgs PR #505103 (pnpm 11 support). See workflow file header for details."
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::error::${MSG}"
            exit 1
          else
            echo "::warning::${MSG}"
            exit 0
          fi

