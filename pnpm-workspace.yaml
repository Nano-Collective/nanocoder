packages:
  - .
  - plugins/*

allowBuilds:
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: true
  node-llama-cpp: false

ignoredBuiltDependencies:
  - protobufjs

minimumReleaseAgeExclude:
  - brace-expansion@1.1.14
  - '@hono/node-server@1.19.14'
  - fast-uri@3.1.2
  - hono@4.12.18

onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@vscode/vsce-sign'
  - esbuild
  - keytar

patchedDependencies:
  ink@6.8.0: patches/ink@6.8.0.patch
