<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<!--
		Use a content security policy to only allow loading styles from our extension directory,
		and only allow scripts that have a specific nonce.
	-->
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}}; script-src 'nonce-{{nonce}}';">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="{{styleUri}}" rel="stylesheet">
	<title>Nanocoder Chat</title>
</head>
<body>
	<div class="flex flex-col h-full bg-vscode-bg text-vscode-fg">
		<div id="chat-view" class="flex flex-col flex-1 overflow-hidden">
			<div id="messages-container" class="flex-1 overflow-y-auto overflow-x-hidden p-4 flex flex-col gap-3">
				<!-- Messages will be injected here -->
			</div>
		</div>

		<div id="history-view" class="flex flex-col flex-1 overflow-hidden hidden">
			<div class="pt-2.5 pb-1.5 px-4 border-b border-vscode-border shrink-0">
				<span class="font-semibold text-[0.9em] uppercase tracking-[0.04em] opacity-70">Session History</span>
			</div>
			<div id="history-list" class="flex-1 overflow-y-auto py-1.5"></div>
		</div>

		<div class="p-4 pt-2 bg-vscode-bg shrink-0">
			<div class="flex flex-col bg-vscode-input-bg border border-vscode-input-border rounded-2xl focus-within:border-vscode-input-focus transition-colors shadow-sm relative">
				<textarea id="chat-input" rows="1" placeholder="Ask Nanocoder anything..." class="w-full min-h-[44px] max-h-[250px] p-3 px-4 pb-2 bg-transparent text-vscode-input-fg font-vscode text-[0.95em] resize-none outline-none border-none"></textarea>
				
				<div class="flex items-center justify-between px-3 pb-2 pt-1 relative">
					<div class="flex gap-1 items-center flex-1 min-w-0">
						<button class="bg-transparent border-none text-vscode-fg opacity-50 hover:opacity-100 cursor-pointer p-1.5 rounded-full hover:bg-vscode-toolbarHover transition-all flex items-center justify-center shrink-0">
							<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
						</button>
						
						<!-- Custom Model Dropdown Trigger -->
						<button id="model-trigger" class="flex items-center gap-1 bg-transparent text-vscode-fg border-none text-[0.85em] outline-none cursor-pointer opacity-70 hover:opacity-100 font-vscode rounded p-1 hover:bg-vscode-toolbarHover max-w-[45%] shrink min-w-0" disabled>
							<span id="model-trigger-label" class="truncate">Loading models...</span>
							<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><polyline points="6 9 12 15 18 9"></polyline></svg>
						</button>

						<!-- Custom Mode Dropdown Trigger -->
						<button id="mode-trigger" class="flex items-center gap-1 bg-transparent text-vscode-fg border-none text-[0.85em] outline-none cursor-pointer opacity-70 hover:opacity-100 font-vscode rounded p-1 hover:bg-vscode-toolbarHover max-w-[35%] shrink min-w-0" disabled>
							<span id="mode-trigger-label" class="truncate">Loading modes...</span>
							<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><polyline points="6 9 12 15 18 9"></polyline></svg>
						</button>
					</div>
					
					<button id="send-stop-btn" class="group bg-[#007acc] [&.is-processing]:bg-[#f14c4c] [&.is-processing]:hover:bg-[#d13a3a] text-white border-none rounded-full w-8 h-8 flex items-center justify-center cursor-pointer shrink-0 transition-all hover:bg-[#005a9e] hover:scale-105 ml-2" title="Send (Enter)">
						<!-- FiSend icon (react-icons/fi) — shown when idle -->
						<svg id="icon-send" class="block group-[.is-processing]:hidden mr-[2px] mt-[1px]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
							<line x1="22" y1="2" x2="11" y2="13"/>
							<polygon points="22 2 15 22 11 13 2 9 22 2"/>
						</svg>
						<!-- FiStopCircle icon (react-icons/fi) — shown while processing -->
						<svg id="icon-stop" class="hidden group-[.is-processing]:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
							<rect x="7" y="7" width="10" height="10" fill="currentColor"/>
						</svg>
					</button>
				</div>
				
				<!-- Dropdown Menus (Full Width) -->
				<div id="model-dropdown" class="hidden absolute bottom-[calc(100%+8px)] left-0 w-full max-h-64 overflow-y-auto bg-vscode-dropdown-bg border border-vscode-focusBorder rounded-lg shadow-xl z-50 flex-col font-vscode py-1"></div>
				<div id="mode-dropdown" class="hidden absolute bottom-[calc(100%+8px)] left-0 w-full max-h-64 overflow-y-auto bg-vscode-dropdown-bg border border-vscode-focusBorder rounded-lg shadow-xl z-50 flex-col font-vscode py-1"></div>
			</div>
		</div>
	<script nonce="{{nonce}}" src="{{markedUri}}"></script>
	<script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
